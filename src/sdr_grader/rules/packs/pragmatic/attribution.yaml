category: attribution_coverage
description: Pragmatic attribution rules — same IDs as strict, looser thresholds.

# ATTR-001 and ATTR-002 demoted to opt-in after May 2026 audit;
# calibration on 2026-05-22 confirmed both are degenerate against the
# 108-fixture corpus. See strict/attribution.yaml header,
# docs/RUBRIC_AUDIT.md, and ATTR-* rows in docs/threshold_calibration.md.

rules:
  - id: ATTR-003
    name: Inconsistent attribution choices across similar metrics
    severity: low
    platforms: [cja, aa]
    check: attribution_inconsistency
    params: {}
    rationale: Same as strict.
    remediation: Same as strict.

  - id: ATTR-004
    name: Data View metric attribution override not documented in description
    severity: low                # demoted from strict's medium
    platforms: [cja]
    check: attribution_setting_undocumented
    params: {}
    rationale: Same as strict.
    remediation: Same as strict.
