category: governance_posture
description: CJA-only stitching rules — pragmatic thresholds.

rules:
  - id: CJASTITCH-001
    name: Stitching configuration has unstitched IDs above threshold
    severity: medium             # demoted from high
    platforms: [cja]
    check: cja_stitching_unstitched
    params:
      max_unstitched_ratio: 0.10  # 10% vs strict 5%
    rationale: Same as strict.
    remediation: Same as strict.
