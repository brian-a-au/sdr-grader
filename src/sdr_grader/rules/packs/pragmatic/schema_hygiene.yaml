category: schema_hygiene
description: |
  Schema hygiene rules — pragmatic thresholds (looser than strict).

rules:
  - id: SCH-001
    name: Duplicate component names within the same component type
    severity: medium
    platforms: [cja, aa]
    check: duplicate_component_names
    params:
      targets: [metrics, dimensions, derived_fields]
    rationale: Same as strict.
    remediation: Same as strict.

  - id: SCH-002
    name: Components referenced but not defined
    severity: high
    platforms: [cja, aa]
    check: broken_references
    params:
      show_top: 10
    rationale: Same as strict.
    remediation: Same as strict.

  - id: SCH-003
    name: Components lacking descriptions
    severity: low                # severity demoted in pragmatic
    platforms: [cja, aa]
    check: missing_descriptions
    params:
      threshold: 0.51            # calibrated p95 across 108-snapshot corpus
      targets: [metrics, dimensions]
    rationale: Same as strict.
    remediation: Same as strict.

  - id: SCH-004
    name: Type-name mismatches
    severity: low
    platforms: [cja, aa]
    check: type_name_mismatch
    params: {}
    rationale: Same as strict.
    remediation: Same as strict.

  - id: SCH-005
    name: Deprecated components still in use
    severity: low
    platforms: [cja, aa]
    check: deprecated_components
    params: {}
    rationale: Same as strict.
    remediation: Same as strict.

  - id: SCH-007
    name: Persistence lookback exceeds 90-day platform cap
    severity: low                # demoted from strict's medium
    platforms: [cja]
    check: persistence_lookback_exceeds_cap
    params:
      cap_days: 90
    rationale: Same as strict.
    remediation: Same as strict.

  - id: SCH-008
    name: Derived field circular references
    severity: medium             # demoted from strict's high
    platforms: [cja]
    check: derived_field_cycles
    params: {}
    rationale: Same as strict.
    remediation: Same as strict.

  - id: SCH-009
    name: Derived field references components that do not exist
    severity: medium             # demoted from strict's high
    platforms: [cja]
    check: derived_field_broken_refs
    params:
      show_top: 10
    rationale: Same as strict.
    remediation: Same as strict.

