category: segment_complexity
description: Pragmatic segment rules — same IDs as strict, looser thresholds.

rules:
  - id: SEG-002
    name: Container type mixing within a single segment
    severity: low                # demoted from medium
    platforms: [cja, aa]
    check: container_mixing
    params: {}
    rationale: Same as strict.
    remediation: Same as strict.

  # SEG-003 unwired: see strict pack note.

  - id: SEG-004
    name: Circular segment references
    severity: medium
    platforms: [cja, aa]
    check: circular_segments
    params: {}
    rationale: Same as strict.
    remediation: Same as strict.

  - id: SEG-005
    name: Segments lacking descriptions
    severity: low
    platforms: [cja, aa]
    check: segments_missing_descriptions
    params:
      threshold: 1.00           # pragmatic: fire only when every segment
                                # lacks a description (no signal in p95
                                # of real corpus to support anything tighter)
    rationale: Same as strict.
    remediation: Same as strict.

  - id: SEG-006
    name: Duplicate segment definitions
    severity: medium             # demoted from high
    platforms: [cja, aa]
    check: duplicate_segments
    params: {}
    rationale: Same as strict.
    remediation: Same as strict.

  - id: SEG-007
    name: Nesting depth exceeds threshold
    severity: low                # demoted from medium
    platforms: [cja, aa]
    check: segment_nesting_depth
    params:
      max_depth: 7              # calibrated p90 across segment-bearing snapshots
    rationale: Same as strict.
    remediation: Same as strict.
