category: governance_posture
description: |
  Governance posture rules — snapshot history, ownership, tagging, and
  documentation discipline.

rules:
  - id: GOV-001
    name: No snapshot history detected
    severity: high
    platforms: [cja, aa]
    check: snapshot_history_absent
    params: {}
    # The rule reads history_present from snapshot metadata when no override is
    # set in params. The directory-mode loader and CI integrations can inject
    # the flag when they have evidence; otherwise the rule fires.
    rationale: |
      Without snapshot history, configuration changes cannot be diffed,
      drift cannot be detected, and audit trails are unavailable for
      compliance review.
    remediation: |
      Establish a snapshot directory in version control and schedule
      regular runs of cja_auto_sdr / aa_auto_sdr to populate it.

  - id: GOV-002
    name: Snapshot exists but is stale
    severity: medium
    platforms: [cja, aa]
    check: snapshot_age
    params:
      max_age_days: 90
    rationale: |
      Stale snapshots are unreliable as audit baselines because the live
      implementation has likely drifted from them.
    remediation: |
      Refresh the snapshot via cja_auto_sdr / aa_auto_sdr and re-run the
      grader.

  - id: GOV-003
    name: No SDR documentation detected
    severity: high
    platforms: [cja, aa]
    check: sdr_doc_absent
    params: {}
    # As with GOV-001, the rule reads sdr_doc_present from snapshot metadata
    # when no override is set in params.
    rationale: |
      Without an SDR, definitions live only in the platform UI, which makes
      peer review and onboarding harder and obscures the &ldquo;why&rdquo;
      behind component choices.
    remediation: |
      Generate the SDR via cja_auto_sdr / aa_auto_sdr and commit it
      alongside this snapshot. Suppress this rule via .sdr-grader.yaml if
      the SDR lives somewhere the grader cannot see.

  # GOV-004 (missing_owners) is registered but not in the default packs.
  # Adobe's APIs do not surface `owner` on inline dimensions / metrics,
  # so cja_auto_sdr can't populate the field even though it pulls
  # everything available upstream. Calibration across 108 real snapshots
  # confirmed: every tenant scored 100% missing-owner even after
  # normalizing "Unknown User" sentinels to None. Operators with their
  # own ownership data can wire the check via a custom pack +
  # --extra-input.

  - id: GOV-005
    name: Components missing tags
    severity: low
    platforms: [cja, aa]
    check: missing_tags
    params:
      threshold: 0.15           # calibrated ~p75 across 108-snapshot corpus
    rationale: |
      Tags are the cheapest way to keep schema browsing tractable as the
      data view grows; without them, finding components by purpose
      requires reading every name.
    remediation: |
      Adopt a small, documented tag taxonomy and apply it via the
      platform API.

