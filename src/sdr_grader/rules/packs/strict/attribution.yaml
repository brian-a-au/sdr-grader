category: attribution_coverage
description: |
  Attribution coverage rules — flag undocumented last-touch defaults,
  metrics with no attribution model specified, and inconsistent choices
  across similar metrics.

# ATTR-001 and ATTR-002 were demoted to opt-in after the May 2026 audit
# (see docs/RUBRIC_AUDIT.md). ATTR-001 fires on 49/49 (100%) revenue-named
# calc metrics across the 108-fixture private corpus; ATTR-002's
# distribution measured p25 = p50 = p75 = 1.00 — fires on every fixture.
# Both check functions stay registered so custom packs can opt in, but
# they no longer ship in the default rubric.

rules:
  - id: ATTR-003
    name: Inconsistent attribution choices across similar metrics
    severity: low
    platforms: [cja, aa]
    check: attribution_inconsistency
    params: {}
    rationale: |
      Calculated metrics over the same input references but with different
      attribution models drift apart in dashboards and produce
      hard-to-explain divergences.
    remediation: |
      Pick one attribution model per concept, document the choice, and
      either migrate the outliers or rename them to make the alternate
      attribution explicit.
