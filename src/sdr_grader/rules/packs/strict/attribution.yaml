category: attribution_coverage
description: |
  Attribution coverage rules — flag undocumented last-touch defaults,
  metrics with no attribution model specified, and inconsistent choices
  across similar metrics.

# ATTR-001 and ATTR-002 were demoted to opt-in after the May 2026 audit
# (see docs/RUBRIC_AUDIT.md). Calibration via
# scripts/calibrate_thresholds.py (run 2026-05-22, see ATTR-* rows in
# docs/threshold_calibration.md) confirmed both are degenerate against
# the 108-fixture private corpus:
#   * ATTR-001: 3 of 3 tenants with any revenue-named calc metrics fire
#     at ratio 1.00 (49 of 49 metrics aggregate).
#   * ATTR-002: p25 = p50 = p75 = p90 = p95 = 1.00 across n=31 tenants;
#     no threshold value can separate signal from baseline today.
# Both check functions stay registered so custom packs can opt in, but
# they no longer ship in the default rubric. ATTR-003 stays in defaults
# as a structural rule even though calibration found 0 observations —
# its prerequisite (≥2 calc metrics with shared refs AND explicit
# attribution models) is rare but the signal is high when it does fire.

rules:
  - id: ATTR-003
    name: Inconsistent attribution choices across similar metrics
    severity: low
    platforms: [cja, aa]
    check: attribution_inconsistency
    params: {}
    rationale: |
      Calculated metrics over the same input references but with different
      attribution models drift apart in dashboards and produce
      hard-to-explain divergences.
    remediation: |
      Pick one attribution model per concept, document the choice, and
      either migrate the outliers or rename them to make the alternate
      attribution explicit.

  - id: ATTR-004
    name: Data View metric attribution override not documented in description
    severity: medium
    platforms: [cja]
    check: attribution_setting_undocumented
    params: {}
    rationale: |
      CJA Data Views allow per-metric attribution overrides. When two
      metrics look identical in the picker but report different numbers,
      the override is usually the reason. If the description doesn't
      mention attribution, the next analyst will have no signal that an
      override is in effect.
    remediation: |
      Update the metric description to name the attribution model and
      why it was chosen, or remove the override if it was unintentional.
