category: segment_complexity
description: |
  Segment complexity rules — container discipline, references, nesting,
  and duplicates. Rules measure shape, ratio, or correctness — never raw
  cardinality (see SPEC §11).

rules:
  - id: SEG-002
    name: Container type mixing within a single segment
    severity: medium
    platforms: [cja, aa]
    check: container_mixing
    params: {}
    rationale: |
      Mixed containers (event / session / person) obscure intent and
      produce surprising population differences from segments that look
      superficially similar.
    remediation: |
      Decompose the segment into composed sub-segments, one per container
      level, and combine them at the surface segment.

  # SEG-003 (orphan_segments) is registered but not in the default packs.
  # The check counts segments that no other segment / calc metric in the
  # snapshot references. In production, segments are referenced by
  # Workspace projects, dashboards, and alerts — none of which the SDR
  # carries. Calibration across 108 real CJA snapshots showed every
  # segment-bearing tenant at 100% orphan, so the rule has no signal in
  # default packs. Operators with Workspace usage data can include the
  # check in a custom rubric pack via the --extra-input pattern.

  - id: SEG-004
    name: Circular segment references
    severity: medium
    platforms: [cja, aa]
    check: circular_segments
    params: {}
    rationale: |
      Circular references break linear evaluation and produce inconsistent
      populations between platform UI and exports.
    remediation: |
      Refactor the involved segments to share a common building-block
      sub-segment instead of mutually referencing each other.

  - id: SEG-005
    name: Segments lacking descriptions
    severity: low
    platforms: [cja, aa]
    check: segments_missing_descriptions
    params:
      threshold: 0.95           # calibrated against 41 segment-bearing
                                # snapshots: ~90% of real tenants have
                                # 100% segments missing descriptions, so
                                # only the most egregious cases fire.
    rationale: |
      Segment intent is exactly the kind of audience-defining decision
      that must be documented; future analysts inherit the segment without
      the conversation that produced it. Real-world adoption of segment
      descriptions is low — the calibrated threshold accepts that and
      flags only tenants where literally every segment is undocumented.
    remediation: |
      Add concise descriptions explaining who the segment captures and
      why.

  - id: SEG-006
    name: Duplicate segment definitions
    severity: high
    platforms: [cja, aa]
    check: duplicate_segments
    params: {}
    rationale: |
      Duplicate segments fragment the audience library and make
      consolidation harder.
    remediation: |
      Designate one canonical segment per audience, redirect consumers,
      and archive the others.

  - id: SEG-007
    name: Nesting depth exceeds threshold
    severity: medium
    platforms: [cja, aa]
    check: segment_nesting_depth
    params:
      max_depth: 5              # calibrated p75 across segment-bearing snapshots
    rationale: |
      Deep nesting makes intent illegible — small definitional changes
      have unpredictable population effects.
    remediation: |
      Decompose the segment into composed sub-segments named for what
      each layer captures.
