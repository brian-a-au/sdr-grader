category: schema_hygiene
description: |
  AA-only eVar discipline rules. These ride alongside the platform-agnostic
  schema_hygiene rules; they short-circuit on CJA snapshots.

rules:
  - id: AAEVAR-001
    name: eVars carrying semantically distinct values
    severity: high
    platforms: [aa]
    check: aa_evar_distinct_values
    params: {}
    rationale: |
      eVars that mix unrelated value semantics (e.g. campaign codes mixed
      with user IDs) blow up cardinality and produce unusable analyses.
    remediation: |
      Split the eVar into separate variables, one per semantic domain, and
      migrate consumers.

  - id: AAEVAR-002
    name: eVars with conflicting allocation / expiration combinations
    severity: medium
    platforms: [aa]
    check: aa_evar_allocation_expiration
    params:
      bad_combinations:
        - [linear, hit]
        - [linear, page-view]
        - [most-recent, visitor]
    rationale: |
      Some allocation / expiration combinations produce counterintuitive
      attribution behavior that surfaces as &ldquo;the numbers don't roll
      up&rdquo; complaints.
    remediation: |
      Pick a coherent allocation / expiration pairing for the eVar's intent
      and document it in the SDR.
