# Monthly, grouped dependency updates: at most one PR per ecosystem per
# month. A dependency bump that changes rendered output fails the
# examples-drift check like any other change; regenerate examples/ in
# the Dependabot PR before merging.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci(deps)"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      python:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"
